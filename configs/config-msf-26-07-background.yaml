# Meson Structure + ePIC background cocktails — July 2026
#
# Self-contained: this one file is the full record of what ran where.
# Chain: afterburner -> bg_merger (11) -> npsim_background (22)
#        -> eicrecon -> csv_eicrecon

base_dir: "/work/eic3/users/romanov/meson-structure-2026-07"

# Container image and directories bound inside it
container: "/work/eic3/users/romanov/meson-structure-work/eicdev-eic-full-2026-06-01.sif"
bind_dirs:
  - "${base_dir}"
  - "/volatile/eic/EPIC/EVGEN/BACKGROUNDS"

# Cocktail sources are root://host//abs/path URLs; on this farm the same files
# are mounted locally, so strip the xrootd prefix and read them directly.
strip_xrootd_prefix: true

energies:
  - "5x41"
  - "9x100"
  - "9x130"
  - "9x275"

# Events per job (bg_merger: number of 2us frames, one signal event per frame)
event_count: 1000

# SLURM stdout/stderr base (admin requirement: NEVER /work — farm jobs
# streaming logs there overload the work file server).
farm_out_dir: "/farm_out/romanov"

# Memory per CPU. The farm is provisioned for 2GB/CPU; requesting more makes
# SLURM bill extra CPUs and idles the farm.
slurm_mem_per_cpu: "2G"

# generate_datasets writes cards under <datasets_dir>/<stage>/
datasets_dir: "${base_dir}/datasets"

# Files per SLURM array task in the CSV stages
slurm_files_per_job: 20

# ---- background cocktails (stages 11 + 22) ------------------------------------
# Cocktail JSONs ship with the pipeline repo (background_cocktails/) — that is
# the default. Uncomment to read them from somewhere else:
# background_config_dir: "/some/other/config_data"
background_configs:
  "5x41":  "synrad_egasbrems_egascoulomb_egastouschek_hgas_5GeVx41GeV_vacuum_10000Ahr_machineruntime_50s.json"
  "9x100": "synrad_egasbrems_egascoulomb_egastouschek_hgas_10GeVx100GeV_GoldCoating_10um_10000Ahr_machineruntime_50s.json"
  "9x130": "synrad_egasbrems_egascoulomb_egastouschek_hgas_10GeVx130GeV_GoldCoating_10um_10000Ahr_machineruntime_50s.json"
  "9x275": "synrad_egasbrems_egascoulomb_egastouschek_hgas_10GeVx275GeV_GoldCoating_10um_10000Ahr_machineruntime_50s.json"

# ---- stages ------------------------------------------------------------------

afterburner:                                        # 10_create_afterburner_jobs.py
  input:   "${base_dir}/eg-hepmc/${energy}-priority"
  pattern: "*.hepmc"
  output:  "${base_dir}/afterburner/${energy}-priority"

bg_merger:                                          # 11_create_background_jobs.py
  input:   "${afterburner.output}"
  pattern: "*.hepmc3.tree.root"
  output:  "${base_dir}/bg_merged/${energy}"

npsim_background:                                   # 22_create_npsim_background_jobs.py
  input:   "${bg_merger.output}"
  pattern: "*.bg.hepmc3.tree.root"
  output:  "${base_dir}/dd4hep-background/${energy}"

eicrecon:                                           # 30_create_eicrecon_jobs.py
  input:   "${npsim_background.output}"
  pattern: "*.edm4hep.root"
  output:  "${base_dir}/reco-background/${energy}"

csv_eicrecon:                                       # 40_csv_convert.py csv_eicrecon
  input:   "${eicrecon.output}"
  pattern: "*.edm4eic.root"
  output:  "${base_dir}/csv-reco-background/${energy}"
  macros:
    - edm4eic_mc_dis
    - edm4eic_reco_dis
    - edm4eic_mcpart_lambda
    - edm4eic_reco_ff_lambda
    - edm4eic_reco_particles
    - edm4eic_calo_clusters
