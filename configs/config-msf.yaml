# config-msf.yaml
#
# meson-structure family overlay. Blends onto config-base: selects the
# Lambda + DIS edm4eic converter set and the basename output stem. Campaign
# configs extend [config-base.yaml, config-msf.yaml].

csv_eicrecon:
  macros:
    - edm4eic_mc_dis
    - edm4eic_reco_dis
    - edm4eic_mcpart_lambda
    - edm4eic_reco_ff_lambda
    - edm4eic_reco_particles
  stem: basename

# Event-generator DIS q2 range (recorded for provenance).
q2_min: 1
q2_max: 500
