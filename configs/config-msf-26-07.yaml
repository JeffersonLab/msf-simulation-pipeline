# Meson Structure campaign — July 2026
#
# Self-contained: this one file is the full record of what ran where.
# Each stage block has  input + pattern + output.
#   generate_datasets <stage> -c this.yaml     globs <stage>.input for <stage>.pattern,
#                                              writes one card per energy
#   python <stage-script>.py -c this.yaml      reads the cards, emits jobs into <stage>.output
# Stages chain via ${<stage>.output}.

base_dir: "/work/eic3/users/romanov/meson-structure-2026-07"

# Container image and directories bound inside it
container: "/cvmfs/singularity.opensciencegrid.org/eicweb/eic_xl:26.06-stable/"
bind_dirs: ["${base_dir}"]

energies:
  - "5x41"
  - "9x100"
  - "9x130"
  - "9x275"

# Events per job. Target statistics for the Lambda combinatorics ML datasets is
# 1M events PER ENERGY = 1000 input files per energy through the whole chain
# (eg-hepmc -> afterburner -> npsim -> eicrecon -> csv); the stages below scale
# with whatever the input globs find, nothing else to change here.
event_count: 1000

# SLURM stdout/stderr base (admin requirement: NEVER /work — farm jobs
# streaming logs there overload the work file server). Logs land under
# <farm_out_dir>/<output path>, e.g. /farm_out/romanov/work/eic3/.../csv-reco/9x130/
farm_out_dir: "/farm_out/romanov"

# Memory per CPU. The farm is provisioned for 2GB/CPU; requesting more makes
# SLURM bill extra CPUs and idles the farm (admin memory-efficiency notice).
slurm_mem_per_cpu: "2G"

# generate_datasets writes cards under <datasets_dir>/<stage>/
datasets_dir: "${base_dir}/datasets"

# Files per SLURM array task in the CSV stages (short jobs are batched so the
# farm does not see floods of <2 min jobs)
slurm_files_per_job: 20

# Event-generator DIS q2 range (provenance)
q2_min: 1
q2_max: 500

# ---- stages ------------------------------------------------------------------

afterburner:                                        # 10_create_afterburner_jobs.py
  input:   "${base_dir}/eg-hepmc/${energy}-priority"
  pattern: "*.hepmc"
  output:  "${base_dir}/afterburner/${energy}-priority"

npsim:                                              # 20_create_npsim_jobs.py
  input:   "${afterburner.output}"
  pattern: "*.hepmc3.tree.root"
  output:  "${base_dir}/dd4hep/${energy}"

eicrecon:                                           # 30_create_eicrecon_jobs.py
  input:   "${npsim.output}"
  pattern: "*.edm4hep.root"
  output:  "${base_dir}/reco/${energy}"
  # B0 recovery for Lambda -> p pi- (ai-comb-lam): truth-seed Geant4 secondaries
  # so the displaced Lambda daughters get B0 tracks. Vertex params are raw
  # dd4hep units (cm): 3000 = 30 m, 100 = 1 m.
  # !! AcceptSecondaries exists only in the PATCHED EICrecon
  # (TrackParamTruthInit, ~6 lines — /work/ai-comb-lam/notes/
  # lesson-b0-tracking-dead-in-campaign.md). On a stock eic_xl image JANA just
  # reports it as an unused parameter and every B0 track collection stays
  # EMPTY, i.e. the comb_candidates CSVs will have no pion candidates.
  flags:
    - "-Ptracking:TrackerTruthSeeds:AcceptSecondaries=1"
    - "-Ptracking:TrackerTruthSeeds:MaxVertexZ=3000"
    - "-Ptracking:TrackerTruthSeeds:MaxVertexX=100"
    - "-Ptracking:TrackerTruthSeeds:MaxVertexY=100"

csv_dd4hep:                                         # 40_csv_convert.py csv_dd4hep
  input:   "${npsim.output}"
  pattern: "*.edm4hep.root"
  output:  "${base_dir}/csv-dd4hep/${energy}"
  macros:
    - edm4hep_acceptance_ppim
    - edm4hep_acceptance_npi0
    - edm4hep_combinatorics_ppim

csv_eicrecon:                                       # 40_csv_convert.py csv_eicrecon
  input:   "${eicrecon.output}"
  pattern: "*.edm4eic.root"
  output:  "${base_dir}/csv-reco/${energy}"
  macros:
    - edm4eic_mc_dis
    - edm4eic_reco_dis
    - edm4eic_mcpart_lambda
    - edm4eic_reco_ff_lambda
    - edm4eic_reco_particles
    - edm4eic_calo_clusters
    # Lambda -> p pi- combinatorics (ai-comb-lam):
    #   lambda_acceptance: per-event acceptance ledger (hits/decay/reco stages)
    #   comb_candidates:   p/pi- candidate table (+ derived *_events.csv);
    #                      B0 candidates need the eicrecon.flags above + patch
    - edm4eic_lambda_acceptance
    - edm4eic_comb_candidates
