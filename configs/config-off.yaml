# config-off.yaml
#
# Official-campaign family overlay. Blends onto config-base: the csv_eicrecon
# cards come from rucio (`generate_datasets csv_eicrecon --rucio -c <config>`), which
# reads the rucio_* keys below. Selects the generic edm4eic converter set and
# the file_index output stem. Campaign configs extend
# [config-base.yaml, config-off.yaml] and set base_dir + rucio_did_pattern.

# --- rucio card producer (official campaigns only) ---------------------------
# Set the pattern per campaign; filters/slug tokens are optional.
rucio_did_filters: ""
# rucio_did_pattern: "epic:/RECO/26.06.0/epic_craterlake/DIS/pythia8.316-1.0/NC/noRad/ep/*"
slug_drop_tokens: []
max_files_per_dataset: 0     # 0 = all files

csv_eicrecon:
  # For rucio cards the output base gets the dataset slug appended, so there is
  # no ${energy} in the path here.
  output: "${base_dir}/csv_eicrecon"
  macros:
    - edm4eic_trk_hits
    - edm4eic_mc_particles
    - edm4eic_reco_particles
  stem: file_index
